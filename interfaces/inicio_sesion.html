<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="icon" type="image/png" href="../imagenes/dolphin.png">
    <link rel="stylesheet" href="../css/inicio_web.css">
    <link rel="stylesheet" href="../css/inicio_sesion.css">
    <link rel="stylesheet" href="../css/global.css">
</head>
<body class="login-page">

    <main class="login-container">
        <div class="login-card">
            <h1 class="login-title">Acceder</h1>
            <p class="login-subtitle">Introduce tus datos para continuar</p>
            
            <form action="dashboard.html" method="POST">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="usuario@correo.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">Entrar</button>
            </form>
            
            <div class="login-footer">
                <a href="#">¿Olvidaste tu contraseña?</a>
                <span>¿No tienes cuenta? <a href="registro_usuario.html">Regístrate</a></span>
            </div>
        </div>
    </main>


</body>
</html>
