<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educattio - Iniciar Sesión</title>
    <link rel="icon" type="image/png" href="../imagenes/dolphin.png">
    <link rel="stylesheet" href="../css/inicio_web.css">
    <link rel="stylesheet" href="../css/inicio_sesion.css">
    <link rel="stylesheet" href="../css/global.css">
</head>
<body class="login-page">

    <main class="login-container">
        <div class="login-card">
            <h1 class="login-title">Acceder</h1>
            <p class="login-subtitle">Introduce tus datos para continuar</p>
            
            <div id="mensaje-error" style="color: #d32f2f; background-color: #ffebee; border: 1px solid #ef5350; padding: 10px; border-radius: 5px; margin-bottom: 15px; display: none; text-align: center; font-size: 14px; font-weight: bold;"></div>
            
            <form action="../php/login.php" method="POST">
                
                <div class="input-group">
                    <label for="usuario">Correo Electrónico o Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="usuario o correo@ejemplo.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">Entrar</button>
            </form>
            
            <div class="login-footer">
                <a href="#">¿Olvidaste tu contraseña?</a>
                <span>¿No tienes cuenta? <a href="registro_usuario.html">Regístrate</a></span>
            </div>
        </div>
    </main>

    <script>
        // Leemos si la URL tiene un "?error=..." al final
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        const mensajeError = document.getElementById('mensaje-error');

        // Dependiendo del error, mostramos un texto u otro
        if (error === 'user') {
            mensajeError.textContent = '❌ No existe ninguna cuenta con ese correo o usuario.';
            mensajeError.style.display = 'block'; // Hacemos visible la caja
        } else if (error === 'pass') {
            mensajeError.textContent = '❌ La contraseña es incorrecta. Inténtalo de nuevo.';
            mensajeError.style.display = 'block'; // Hacemos visible la caja
        }
    </script>

</body>
</html>
