<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educattio - Crear Cuenta</title>
    
    <link rel="icon" type="image/png" href="../imagenes/dolphin.png">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/registro_usuario.css">
</head>
<body> <main class="register-container">
        <div class="register-card">
            
            <header class="register-header">
                <h1 class="register-title">¡Bienvenido, profe!</h1>
                <p class="register-subtitle">Rellena el formulario para crear tu espacio educativo</p>
            </header>

            <form action="dashboard.html" method="POST" class="register-form">
                
                <div class="form-grid">
                    
                    <div class="input-wrapper">
                        <label for="name">Nombre Completo</label>
                        <input type="text" id="name" name="name" placeholder="Ej: María García" required>
                    </div>

                    <div class="input-wrapper">
                        <label for="username">Nombre de Usuario</label>
                        <input type="text" id="username" name="username" placeholder="Ej: maria_profe" required>
                    </div>

                    <div class="input-wrapper">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
                    </div>

                    <div class="input-wrapper">
                        <label for="phone">Teléfono (Opcional)</label>
                        <input type="tel" id="phone" name="phone" placeholder="+34 600 000 000">
                    </div>
                    
                    <div class="input-wrapper">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
                    </div>
                    
                    <div class="input-wrapper">
                        <label for="confirm-password">Repetir Contraseña</label>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirma tu contraseña" required>
                    </div>

                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-minimal">Registrarse</button>
                </div>

                <div class="register-footer">
                    <span>¿Ya tienes una cuenta? <a href="inicio_sesion.html">Inicia Sesión aquí</a></span>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
